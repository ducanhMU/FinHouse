# ════════════════════════════════════════════════════════════
# FinHouse — SYSTEM stack
# ════════════════════════════════════════════════════════════
# Services: FastAPI, Streamlit UI, PostgreSQL, MinIO, Milvus,
#           etcd, SearXNG, bucket-init
#
# What this stack does NOT run: Ollama, BGE-M3 embed, BGE rerank.
# Those are in stacks/models.yml and stacks/ollama.yml.
#
# Usage:
#   ./start.sh system            # up
#   ./start.sh system down       # tear down
# ════════════════════════════════════════════════════════════

services:

  finhouse-postgres:
    image: postgres:16
    container_name: finhouse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "15432:5432"
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data
      - ./api/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - finhouse-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  finhouse-minio:
    image: minio/minio
    container_name: finhouse-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "19000:9000"
      - "19001:9001"
    volumes:
      - ./volumes/minio:/data
    networks:
      - finhouse-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 5

  finhouse-minio-init:
    image: minio/mc
    container_name: finhouse-minio-init
    depends_on:
      finhouse-minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://finhouse-minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
        mc mb --ignore-existing local/${MINIO_BUCKET};
        mc mb --ignore-existing local/milvus-bucket;
        echo 'Buckets ready: ${MINIO_BUCKET}, milvus-bucket';
      "
    networks:
      - finhouse-net

  finhouse-etcd:
    image: quay.io/coreos/etcd:v3.5.16
    container_name: finhouse-etcd
    restart: unless-stopped
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command: >
      etcd
      --advertise-client-urls=http://0.0.0.0:2379
      --listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd
    volumes:
      - ./volumes/etcd:/etcd
    networks:
      - finhouse-net
    healthcheck:
      test: ["CMD", "etcdctl", "--endpoints=http://localhost:2379", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  finhouse-milvus:
    image: milvusdb/milvus:v2.4.17
    container_name: finhouse-milvus
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: finhouse-etcd:2379
      MINIO_ADDRESS: finhouse-minio:9000
      MINIO_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      MINIO_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET_NAME: milvus-bucket
      MINIO_USE_SSL: "false"
      COMMON_STORAGETYPE: minio
    ports:
      - "19530:19530"
      - "29091:9091"
    depends_on:
      finhouse-etcd:
        condition: service_healthy
      finhouse-minio:
        condition: service_healthy
      finhouse-minio-init:
        condition: service_completed_successfully
    volumes:
      - ./volumes/milvus:/var/lib/milvus
    networks:
      - finhouse-net

  finhouse-searxng:
    image: searxng/searxng:latest
    container_name: finhouse-searxng
    restart: unless-stopped
    ports:
      - "18080:8080"
    volumes:
      - ./searxng:/etc/searxng:rw
    networks:
      - finhouse-net
    environment:
      SEARXNG_BASE_URL: http://localhost:18080/

  finhouse-api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: finhouse-api
    restart: unless-stopped
    ports:
      - "18000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    env_file:
      - .env
    environment:
      DATA_DIR: /app/data
    volumes:
      - ./data:/app/data:ro
    depends_on:
      finhouse-postgres:
        condition: service_healthy
      finhouse-minio:
        condition: service_healthy
      finhouse-milvus:
        condition: service_started
    networks:
      - finhouse-net

  finhouse-ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    container_name: finhouse-ui
    restart: unless-stopped
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      API_BASE_URL: http://finhouse-api:8000
    depends_on:
      - finhouse-api
    networks:
      - finhouse-net

networks:
  finhouse-net:
    name: finhouse-net
    driver: bridge
