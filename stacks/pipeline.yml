x-airflow-common: &airflow-common
  build:
    context: ../pipeline/airflow
    dockerfile: Dockerfile
  env_file: ../.env
  user: "${AIRFLOW_UID:-50000}:0"
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:${AIRFLOW_DB_PASSWORD}@finhouse-airflow-db:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: "${AIRFLOW_FERNET_KEY:-VKgYkKkKI8G5bxqJd2aTVvGgugpNElZkIhF0ZVwMPs0=}"
    AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    AIRFLOW__WEBSERVER__DEFAULT_UI_TIMEZONE: "Asia/Ho_Chi_Minh"
    AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session"
    # Spark client config — SparkSubmitOperator and spark-submit both use these
    SPARK_HOME: /opt/spark
    JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
    AIRFLOW_CONN_SPARK_DEFAULT: "spark://finhouse-spark-master:7077"
    # ClickHouse — passed to ingest_job.py via subprocess env inheritance
    CLICKHOUSE_HOST: finhouse-clickhouse
    CLICKHOUSE_PORT: "${CLICKHOUSE_PORT:-8123}"
    CLICKHOUSE_USER: "${CLICKHOUSE_USER}"
    CLICKHOUSE_PASSWORD: "${CLICKHOUSE_PASSWORD}"
    CLICKHOUSE_DB: "${CLICKHOUSE_DB}"
  volumes:
    - ../pipeline/airflow/dags:/opt/airflow/dags
    - ../pipeline/airflow/plugins:/opt/airflow/plugins
    - ../pipeline/airflow/logs:/opt/airflow/logs
    # Spark job script available to spark-submit running inside the Airflow container
    - ../pipeline/spark/ingest_job.py:/opt/airflow/spark/ingest_job.py:ro
    # Shared data folder — same host path mounted at the same container path across all services
    - ../data:/opt/finhouse/data
  networks:
    - finhouse-net
  depends_on:
    finhouse-airflow-db:
      condition: service_healthy


services:
  # ── POSTGRES (for Airflow) ─────────────────────────────────────
  finhouse-airflow-db:
    image: postgres:14
    container_name: finhouse-airflow-db
    env_file: ../.env
    environment:
      POSTGRES_DB: airflow
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: ${AIRFLOW_DB_PASSWORD}
    volumes:
      - ../volumes/airflow-postgres:/var/lib/postgresql/data
    networks:
      - finhouse-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  finhouse-airflow-init:
    <<: *airflow-common
    container_name: finhouse-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db init
        airflow users create --username ${AIRFLOW_USER} --password ${AIRFLOW_PASSWORD} \
          --firstname Admin --lastname User --role Admin --email admin@example.com
    depends_on:
      finhouse-airflow-db:
        condition: service_healthy

  finhouse-airflow-webserver:
    <<: *airflow-common
    container_name: finhouse-airflow-webserver
    restart: always
    ports:
      - "8091:8080"
    command: webserver
    depends_on:
      finhouse-airflow-init:
        condition: service_completed_successfully

  finhouse-airflow-scheduler:
    <<: *airflow-common
    container_name: finhouse-airflow-scheduler
    restart: always
    command: scheduler
    depends_on:
      finhouse-airflow-init:
        condition: service_completed_successfully

  # ── NIFI ───────────────────────────────────────────────────────
  finhouse-nifi:
    image: apache/nifi:1.15.3
    container_name: finhouse-nifi
    restart: unless-stopped
    env_file: ../.env
    environment:
      - NIFI_WEB_HTTP_PORT=8080
      - NIFI_WEB_HTTP_HOST=0.0.0.0
      - TZ=Asia/Ho_Chi_Minh
      - SINGLE_USER_CREDENTIALS_USERNAME=${NIFI_USER}
      - SINGLE_USER_CREDENTIALS_PASSWORD=${NIFI_PASSWORD}
    ports:
      - "8090:8080"
    volumes:
      - ../volumes/nifi/conf:/opt/nifi/nifi-current/conf
      - ../volumes/nifi/database_repository:/opt/nifi/nifi-current/database_repository
      - ../volumes/nifi/flowfile_repository:/opt/nifi/nifi-current/flowfile_repository
      - ../volumes/nifi/content_repository:/opt/nifi/nifi-current/content_repository
      - ../volumes/nifi/provenance_repository:/opt/nifi/nifi-current/provenance_repository
      - ../volumes/nifi/state:/opt/nifi/nifi-current/state
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      # Shared data folder at the same path as all other pipeline services
      - ../data:/opt/finhouse/data
    networks:
      - finhouse-net

  # ── SPARK MASTER ───────────────────────────────────────────────
  finhouse-spark-master:
    build:
      context: ../pipeline/spark
      dockerfile: Dockerfile
    container_name: finhouse-spark-master
    environment:
      - SPARK_MODE=master
    ports:
      - "7077:7077"   # cluster submission port
      - "8081:8080"   # Spark Web UI
      - "6066:6066"   # REST submission API
    volumes:
      - ../pipeline/spark/conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf
      - ../pipeline/spark/ingest_job.py:/opt/spark/jobs/ingest_job.py:ro
      - ../data:/opt/finhouse/data
    networks:
      - finhouse-net

  # ── SPARK WORKER ───────────────────────────────────────────────
  finhouse-spark-worker:
    build:
      context: ../pipeline/spark
      dockerfile: Dockerfile
    container_name: finhouse-spark-worker
    depends_on:
      - finhouse-spark-master
    env_file: ../.env
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://finhouse-spark-master:7077
      - SPARK_WORKER_MEMORY=${SPARK_WORKER_MEMORY}
      - SPARK_WORKER_CORES=${SPARK_WORKER_CORES}
    volumes:
      - ../pipeline/spark/conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf
      - ../pipeline/spark/ingest_job.py:/opt/spark/jobs/ingest_job.py:ro
      - ../data:/opt/finhouse/data
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    networks:
      - finhouse-net

  # ── CLICKHOUSE ─────────────────────────────────────────────────
  finhouse-clickhouse:
    image: clickhouse/clickhouse-server:23.8
    container_name: finhouse-clickhouse
    env_file: ../.env
    ports:
      - "${CLICKHOUSE_PORT}:8123"
      - "39000:9000"
    environment:
      - CLICKHOUSE_DB=${CLICKHOUSE_DB}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
    volumes:
      - ../volumes/clickhouse:/var/lib/clickhouse
      - ../data:/var/lib/clickhouse/user_files
      - ../pipeline/clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - finhouse-net
    ulimits:
      nofile:
        soft: 262144
        hard: 262144


networks:
  finhouse-net:
    name: finhouse_finhouse-net
    external: true
