x-airflow-common: &airflow-common
  build:
    context: ../pipeline/airflow
    dockerfile: Dockerfile
  env_file: ../.env
  user: "${AIRFLOW_UID:-50000}:0"
  environment:
    &airflow-common-env
    USER: "airflow"
    AIRFLOW_UID: "${AIRFLOW_UID:-50000}"
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:${AIRFLOW_DB_PASSWORD}@finhouse-airflow-db:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: "${AIRFLOW_FERNET_KEY:-VKgYkKkKI8G5bxqJd2aTVvGgugpNElZkIhF0ZVwMPs0=}"
    AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    AIRFLOW__WEBSERVER__DEFAULT_UI_TIMEZONE: "Asia/Ho_Chi_Minh"
    AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session"
    # Spark client config — SparkSubmitOperator and spark-submit both use these
    SPARK_HOME: /opt/spark
    JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
    AIRFLOW_CONN_SPARK_DEFAULT: "spark://finhouse-spark-master:7077"
    # Pin Python interpreter for the PySpark driver (client mode runs driver in this container)
    # and for executors — keep both sides on the same Python so cloudpickle stays compatible.
    PYSPARK_PYTHON: python3
    PYSPARK_DRIVER_PYTHON: python3
    # ClickHouse — passed to ingest_job.py via subprocess env inheritance
    CLICKHOUSE_HOST: finhouse-clickhouse
    CLICKHOUSE_PORT: "${CLICKHOUSE_PORT:-8123}"
    CLICKHOUSE_USER: "${CLICKHOUSE_USER}"
    CLICKHOUSE_PASSWORD: "${CLICKHOUSE_PASSWORD}"
    CLICKHOUSE_DB: "${CLICKHOUSE_DB}"
  volumes:
    - ../pipeline/airflow/dags:/opt/airflow/dags
    - ../pipeline/airflow/plugins:/opt/airflow/plugins
    - ../pipeline/airflow/logs:/opt/airflow/logs
    # Spark job script available to spark-submit running inside the Airflow container
    - ../pipeline/spark/ingest_job.py:/opt/airflow/spark/ingest_job.py:ro
    # Shared data folder — same host path mounted at the same container path across all services
    - ../data:/opt/finhouse/data
  networks:
    - finhouse-net
  depends_on:
    finhouse-airflow-db:
      condition: service_healthy


services:
  # ── POSTGRES (for Airflow) ─────────────────────────────────────
  finhouse-airflow-db:
    image: postgres:14
    container_name: finhouse-airflow-db
    env_file: ../.env
    environment:
      POSTGRES_DB: airflow
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: ${AIRFLOW_DB_PASSWORD}
    volumes:
      - ../volumes/airflow-postgres:/var/lib/postgresql/data
    networks:
      - finhouse-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  finhouse-airflow-init:
    <<: *airflow-common
    container_name: finhouse-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        # 1. Sử dụng db migrate thay vì db init (theo log khuyến nghị)
        airflow db migrate
        
        # 2. Tạo user nhưng thêm || true để tránh crash nếu user đã tồn tại
        # Thêm USER=airflow ngay trước lệnh để bypass lỗi KeyError
        USER=airflow airflow users create \
          --username "${AIRFLOW_USER}" \
          --password "${AIRFLOW_PASSWORD}" \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com || true

  finhouse-airflow-webserver:
    <<: *airflow-common
    container_name: finhouse-airflow-webserver
    restart: always
    ports:
      - "8091:8080"
    command: webserver
    depends_on:
      finhouse-airflow-init:
        condition: service_completed_successfully

  finhouse-airflow-scheduler:
    <<: *airflow-common
    container_name: finhouse-airflow-scheduler
    restart: always
    command: scheduler
    depends_on:
      finhouse-airflow-init:
        condition: service_completed_successfully

  # ── NIFI ───────────────────────────────────────────────────────
  finhouse-nifi:
    image: apache/nifi:1.15.3
    container_name: finhouse-nifi
    restart: unless-stopped
    env_file: ../.env
    environment:
      - NIFI_WEB_HTTP_PORT=8080
      - NIFI_WEB_HTTP_HOST=0.0.0.0
      - TZ=Asia/Ho_Chi_Minh
      - SINGLE_USER_CREDENTIALS_USERNAME=${NIFI_USER}
      - SINGLE_USER_CREDENTIALS_PASSWORD=${NIFI_PASSWORD}
    ports:
      - "8090:8080"
    volumes:
      # Sử dụng Named Volumes để lưu trạng thái bền vững và tránh lỗi Permission
      - nifi-conf:/opt/nifi/nifi-current/conf
      - nifi-database:/opt/nifi/nifi-current/database_repository
      - nifi-flowfile:/opt/nifi/nifi-current/flowfile_repository
      - nifi-content:/opt/nifi/nifi-current/content_repository
      - nifi-provenance:/opt/nifi/nifi-current/provenance_repository
      - nifi-state:/opt/nifi/nifi-current/state
      
      # Đồng bộ thời gian với host
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      
      # Giữ bind mount này để làm việc với dữ liệu thực tế
      - ../data:/opt/finhouse/data
    networks:
      - finhouse-net

  # ── SPARK MASTER ───────────────────────────────────────────────
  finhouse-spark-master:
    build:
      context: ../pipeline/spark
      dockerfile: Dockerfile
    container_name: finhouse-spark-master
    environment:
      - SPARK_MODE=master
    ports:
      - "7077:7077"   # cluster submission port
      - "8081:8080"   # Spark Web UI
      - "6066:6066"   # REST submission API
    volumes:
      - ../pipeline/spark/conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf
      - ../pipeline/spark/ingest_job.py:/opt/spark/jobs/ingest_job.py:ro
      - ../data:/opt/finhouse/data
    networks:
      - finhouse-net

  # ── SPARK WORKER ───────────────────────────────────────────────
  finhouse-spark-worker:
    build:
      context: ../pipeline/spark
      dockerfile: Dockerfile
    container_name: finhouse-spark-worker
    depends_on:
      - finhouse-spark-master
    env_file: ../.env
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://finhouse-spark-master:7077
      - SPARK_WORKER_MEMORY=${SPARK_WORKER_MEMORY}
      - SPARK_WORKER_CORES=${SPARK_WORKER_CORES}
    volumes:
      - ../pipeline/spark/conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf
      - ../pipeline/spark/ingest_job.py:/opt/spark/jobs/ingest_job.py:ro
      - ../data:/opt/finhouse/data
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    networks:
      - finhouse-net

  # ── CLICKHOUSE ─────────────────────────────────────────────────
  finhouse-clickhouse:
    image: clickhouse/clickhouse-server:23.8
    container_name: finhouse-clickhouse
    env_file: ../.env
    ports:
      - "${CLICKHOUSE_PORT}:8123"
      - "39000:9000"
    environment:
      - CLICKHOUSE_DB=${CLICKHOUSE_DB}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
    volumes:
      - ../volumes/clickhouse:/var/lib/clickhouse
      - ../data:/var/lib/clickhouse/user_files
      - ../pipeline/clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - finhouse-net
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

volumes:
  nifi-conf:
  nifi-database:
  nifi-flowfile:
  nifi-content:
  nifi-provenance:
  nifi-state:

networks:
  finhouse-net:
    name: finhouse_finhouse-net
    external: true