version: "3.9"

# ============================================================
# FinHouse — Docker Compose
# ============================================================

services:

  # ── PostgreSQL ────────────────────────────────────────────
  finhouse-postgres:
    image: postgres:16
    container_name: finhouse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./api/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - finhouse-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── MinIO ─────────────────────────────────────────────────
  finhouse-minio:
    image: minio/minio
    container_name: finhouse-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - finhouse-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  # MinIO bucket init (one-shot)
  finhouse-minio-init:
    image: minio/mc
    container_name: finhouse-minio-init
    depends_on:
      finhouse-minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://finhouse-minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
        mc mb --ignore-existing local/${MINIO_BUCKET};
        echo 'Bucket ${MINIO_BUCKET} ready';
      "
    networks:
      - finhouse-net

  # ── etcd (Milvus dependency) ──────────────────────────────
  finhouse-etcd:
    image: quay.io/coreos/etcd:v3.5.16
    container_name: finhouse-etcd
    restart: unless-stopped
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command: >
      etcd
      --advertise-client-urls=http://0.0.0.0:2379
      --listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd
    volumes:
      - etcd-data:/etcd
    networks:
      - finhouse-net
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Milvus ────────────────────────────────────────────────
  finhouse-milvus:
    image: milvusdb/milvus:v2.4.17
    container_name: finhouse-milvus
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: finhouse-etcd:2379
      MINIO_ADDRESS: finhouse-minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      finhouse-etcd:
        condition: service_healthy
      finhouse-minio:
        condition: service_healthy
    volumes:
      - milvus-data:/var/lib/milvus
    networks:
      - finhouse-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Ollama ────────────────────────────────────────────────
  finhouse-ollama:
    image: ollama/ollama
    container_name: finhouse-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    networks:
      - finhouse-net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── SearXNG (Web Search) ──────────────────────────────────
  finhouse-searxng:
    image: searxng/searxng:latest
    container_name: finhouse-searxng
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./searxng:/etc/searxng:rw
    networks:
      - finhouse-net
    environment:
      SEARXNG_BASE_URL: http://localhost:8080/

  # ── BGE-M3 Embedding Service ──────────────────────────────
  finhouse-bge-m3:
    build:
      context: ./embed
      dockerfile: Dockerfile
    container_name: finhouse-bge-m3
    restart: unless-stopped
    ports:
      - "8081:8081"
    networks:
      - finhouse-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── BGE-M3 Reranker Service ───────────────────────────────
  finhouse-reranker:
    build:
      context: ./rerank
      dockerfile: Dockerfile
    container_name: finhouse-reranker
    restart: unless-stopped
    ports:
      - "8082:8082"
    networks:
      - finhouse-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── FastAPI Backend ───────────────────────────────────────
  finhouse-api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: finhouse-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATA_DIR: /app/data
    volumes:
      - ./data:/app/data:ro
    depends_on:
      finhouse-postgres:
        condition: service_healthy
      finhouse-minio:
        condition: service_healthy
      finhouse-milvus:
        condition: service_healthy
      finhouse-ollama:
        condition: service_healthy
    networks:
      - finhouse-net

  # ── Streamlit UI ──────────────────────────────────────────
  finhouse-ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    container_name: finhouse-ui
    restart: unless-stopped
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      API_BASE_URL: http://finhouse-api:8000
    depends_on:
      - finhouse-api
    networks:
      - finhouse-net

# ── Volumes ───────────────────────────────────────────────
volumes:
  pg-data:
  minio-data:
  etcd-data:
  milvus-data:
  ollama-models:

# ── Network ───────────────────────────────────────────────
networks:
  finhouse-net:
    driver: bridge
