version: "3.9"

# ============================================================
# FinHouse — Docker Compose
# Changes:
#   - Milvus env vars: MINIO_ACCESS_KEY_ID + MINIO_SECRET_ACCESS_KEY
#     (these are the correct names per Milvus v2.4.17 milvus.yaml config)
#   - Milvus uses its own bucket "milvus-bucket", not your app bucket
#   - Ollama GPU reservation is now conditional via profile (see instructions below)
#   - Longer start_period on Milvus so it doesn't fail healthcheck during init
# ============================================================

services:

  # ── PostgreSQL ────────────────────────────────────────────
  finhouse-postgres:
    image: postgres:16
    container_name: finhouse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "15432:5432"
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data
      - ./api/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - finhouse-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── MinIO ─────────────────────────────────────────────────
  finhouse-minio:
    image: minio/minio
    container_name: finhouse-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "19000:9000"
      - "19001:9001"
    volumes:
      - ./volumes/minio:/data
    networks:
      - finhouse-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 5

  # MinIO bucket init — creates BOTH the app bucket and the Milvus bucket
  finhouse-minio-init:
    image: minio/mc
    container_name: finhouse-minio-init
    depends_on:
      finhouse-minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://finhouse-minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
        mc mb --ignore-existing local/${MINIO_BUCKET};
        mc mb --ignore-existing local/milvus-bucket;
        echo 'Buckets ready: ${MINIO_BUCKET}, milvus-bucket';
      "
    networks:
      - finhouse-net

  # ── etcd (Milvus dependency) ──────────────────────────────
  finhouse-etcd:
    image: quay.io/coreos/etcd:v3.5.16
    container_name: finhouse-etcd
    restart: unless-stopped
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command: >
      etcd
      --advertise-client-urls=http://0.0.0.0:2379
      --listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd
    volumes:
      - ./volumes/etcd:/etcd
    networks:
      - finhouse-net
    healthcheck:
      test: ["CMD", "etcdctl", "--endpoints=http://localhost:2379", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Milvus (v2.4.17 — correct env var names) ─────────────
  finhouse-milvus:
    image: milvusdb/milvus:v2.4.17
    container_name: finhouse-milvus
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: finhouse-etcd:2379
      MINIO_ADDRESS: finhouse-minio:9000
      MINIO_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      MINIO_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET_NAME: milvus-bucket
      MINIO_USE_SSL: "false"
      COMMON_STORAGETYPE: minio
    ports:
      - "19530:19530"
      - "29091:9091"
    depends_on:
      finhouse-etcd:
        condition: service_healthy
      finhouse-minio:
        condition: service_healthy
      finhouse-minio-init:
        condition: service_completed_successfully
    volumes:
      - ./volumes/milvus:/var/lib/milvus
    networks:
      - finhouse-net

  # ── Ollama (LOCAL mode) ──────────────────────────────────
  # To use a REMOTE Ollama server instead:
  #   1. Comment out this whole service + finhouse-model-puller
  #   2. Set OLLAMA_HOST=http://your-server:11434 in .env
  #   3. Remove finhouse-ollama from finhouse-api's depends_on
  finhouse-ollama:
    image: ollama/ollama
    container_name: finhouse-ollama
    restart: unless-stopped
    profiles: ["local-llm"]
    ports:
      - "21434:11434"
    volumes:
      - ./volumes/ollama:/root/.ollama
    networks:
      - finhouse-net
    # GPU reservation. If you DON'T have an NVIDIA GPU + nvidia-container-toolkit,
    # comment out the entire `deploy:` block below. Ollama will run on CPU.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 120s

  # Model puller (one-shot) — uses `ollama` CLI against the server
  finhouse-model-puller:
    image: ollama/ollama
    container_name: finhouse-model-puller
    restart: "no"
    profiles: ["local-llm"]
    depends_on:
      finhouse-ollama:
        condition: service_started
    entrypoint: ["/bin/sh", "/scripts/pull-models.sh"]
    environment:
      OLLAMA_HOST: http://finhouse-ollama:11434
    volumes:
      - ./scripts:/scripts:ro
    networks:
      - finhouse-net

  # ── SearXNG (Web Search) ──────────────────────────────────
  finhouse-searxng:
    image: searxng/searxng:latest
    container_name: finhouse-searxng
    restart: unless-stopped
    ports:
      - "18080:8080"
    volumes:
      - ./searxng:/etc/searxng:rw
    networks:
      - finhouse-net
    environment:
      SEARXNG_BASE_URL: http://localhost:18080/

  # ── BGE-M3 Embedding Service (LOCAL mode) ────────────────
  # To use a REMOTE embed service or managed API only:
  #   - Omit "local-embed" from COMPOSE_PROFILES
  #   - Set EMBED_HOST=http://your-server:8081 in .env (remote service), OR
  #     leave EMBED_HOST empty and set EMBED_API_URL/KEY for managed API
  finhouse-bge-m3:
    build:
      context: ./embed
      dockerfile: Dockerfile
    container_name: finhouse-bge-m3
    restart: unless-stopped
    profiles: ["local-embed"]
    ports:
      - "28081:8081"
    networks:
      - finhouse-net
    # GPU if available. If host has no NVIDIA runtime, comment out this block.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ── BGE-M3 Reranker Service (LOCAL mode) ─────────────────
  # To use a REMOTE reranker or managed API only:
  #   - Omit "local-rerank" from COMPOSE_PROFILES
  #   - Set RERANK_HOST=http://your-server:8082 or RERANK_API_URL/KEY
  finhouse-reranker:
    build:
      context: ./rerank
      dockerfile: Dockerfile
    container_name: finhouse-reranker
    restart: unless-stopped
    profiles: ["local-rerank"]
    ports:
      - "28082:8082"
    networks:
      - finhouse-net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ── FastAPI Backend ───────────────────────────────────────
  finhouse-api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: finhouse-api
    restart: unless-stopped
    ports:
      - "18000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    env_file:
      - .env
    environment:
      DATA_DIR: /app/data
    volumes:
      - ./data:/app/data:ro
    depends_on:
      finhouse-postgres:
        condition: service_healthy
      finhouse-minio:
        condition: service_healthy
      finhouse-milvus:
        condition: service_started
      # Optional local services — only depended on if their profile is active.
      # If you run Ollama/embed/rerank remotely, remove these lines.
      # Profile-excluded services become no-ops in depends_on automatically.
      finhouse-ollama:
        condition: service_started
        required: false
      finhouse-bge-m3:
        condition: service_started
        required: false
      finhouse-reranker:
        condition: service_started
        required: false
    networks:
      - finhouse-net

  # ── Streamlit UI ──────────────────────────────────────────
  finhouse-ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    container_name: finhouse-ui
    restart: unless-stopped
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      API_BASE_URL: http://finhouse-api:8000
      HOST_API: ${HOST_API:-localhost}
      HOST_PORT: ${HOST_PORT:-18000}
    depends_on:
      - finhouse-api
    networks:
      - finhouse-net

networks:
  finhouse-net:
    driver: bridge